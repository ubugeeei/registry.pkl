name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    env:
      DOCS_BASE: /registry.pkl/
      DOCS_SITE_URL: https://ubugeeei.github.io/registry.pkl/
      PKL_VERSION: 0.31.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pkl
        run: |
          curl -L -o pkl "https://github.com/apple/pkl/releases/download/${PKL_VERSION}/pkl-linux-amd64"
          chmod +x pkl
          sudo mv pkl /usr/local/bin/pkl
          pkl --version

      - name: Generate workspace manifests
        run: pkl eval -m . root-files.pkl

      - name: Resolve package dependencies
        run: pkl project resolve . packages/target.*

      - name: Run Pkl API tests
        run: bash scripts/test.sh

      - name: Render registry record sources
        run: bash scripts/render-registry.sh

      - name: Render every example
        run: bash scripts/render-examples.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate GitHub Pages-safe docs links
        run: |
          if rg -n 'link: /|\]\(/' packages/docs/content; then
            echo "Root-absolute internal docs links break project GitHub Pages deployments."
            exit 1
          fi

      - name: Run checks
        run: pnpm check

      - name: Build docs
        run: pnpm build

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Build
        run: cargo build --release --workspace

      - name: Test
        run: cargo test --release --workspace
