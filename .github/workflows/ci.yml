name: CI

on:
  pull_request:
    branches:
      - main
      - publish
  push:
    branches:
      - main
      - publish
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: 24
  PKL_VERSION: 0.31.0
  PKL_LINUX_AMD64_SHA256: 5a5c2a889b68ca92ff4258f9d277f92412b98dfef5057daef7564202a20870b6
  PNPM_VERSION: 10.31.0

jobs:
  pkl-packages:
    name: Pkl packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Pkl
        uses: ./.github/actions/setup-pkl
        with:
          version: ${{ env.PKL_VERSION }}
          linux-amd64-sha256: ${{ env.PKL_LINUX_AMD64_SHA256 }}

      - name: Generate workspace manifests
        run: pkl eval -m . root-files.pkl

      - name: Resolve package dependencies
        run: pkl project resolve . packages/target.*

      - name: Verify generated metadata is current
        run: |
          git diff --exit-code -- \
            PklProject.deps.json \
            packages/*/PklProject.deps.json \
            packages/docs/tsconfig.json

      - name: Build package artifacts
        run: ./scripts/package-artifacts.sh

      - name: Build publish layout
        run: ./scripts/build-publish-layout.sh

      - name: Upload package artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-artifacts-debug
          path: dist/package-artifacts
          if-no-files-found: ignore

  docs-check:
    name: Docs check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOCS_BASE: /registry.pkl/
      DOCS_SITE_URL: https://ubugeeei.github.io/registry.pkl/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Pkl
        uses: ./.github/actions/setup-pkl
        with:
          version: ${{ env.PKL_VERSION }}
          linux-amd64-sha256: ${{ env.PKL_LINUX_AMD64_SHA256 }}

      - name: Generate workspace manifests
        run: pkl eval -m . root-files.pkl

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate GitHub Pages-safe docs links
        run: |
          if rg -n 'link: /|\]\(/' packages/docs/content; then
            echo "Root-absolute internal docs links break project GitHub Pages deployments."
            exit 1
          fi

      - name: Run checks
        run: pnpm check

      - name: Run tests
        run: pnpm test

  docs-build:
    name: Docs build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DOCS_BASE: /registry.pkl/
      DOCS_SITE_URL: https://ubugeeei.github.io/registry.pkl/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Pkl
        uses: ./.github/actions/setup-pkl
        with:
          version: ${{ env.PKL_VERSION }}
          linux-amd64-sha256: ${{ env.PKL_LINUX_AMD64_SHA256 }}

      - name: Generate workspace manifests
        run: pkl eval -m . root-files.pkl

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install docs browser dependencies
        run: pnpm --filter @registry/docs exec puppeteer browsers install chrome-headless-shell

      - name: Build docs
        run: pnpm build

      - name: Upload docs artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-debug
          path: dist/docs
          if-no-files-found: ignore
