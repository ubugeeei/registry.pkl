name: Release Packages

on:
  push:
    tags:
      - "target.*-v*"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to confirm manual package publishing"
        required: true
        type: string
      projects:
        description: "Package names or project paths to release (for example: target.js target.rust)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: package-release
    env:
      NODE_VERSION: 24
      PKL_VERSION: 0.31.0
      PKL_LINUX_AMD64_SHA256: 5a5c2a889b68ca92ff4258f9d277f92412b98dfef5057daef7564202a20870b6
      PACKAGE_HOST: ${{ vars.PACKAGE_HOST }}
      PACKAGE_BASE_PATH: ${{ vars.PACKAGE_BASE_PATH }}
      PACKAGE_BASE_URL: ${{ vars.PACKAGE_BASE_URL }}
      PACKAGE_BUCKET: ${{ vars.PACKAGE_BUCKET }}
      PACKAGE_S3_ENDPOINT: ${{ vars.PACKAGE_S3_ENDPOINT }}
      PACKAGE_AWS_REGION: ${{ vars.PACKAGE_AWS_REGION || 'auto' }}
      PACKAGE_OUTPUT_DIR: dist/package-artifacts
      PUBLISH_DIR: dist/publish
      SKIP_PUBLISH_CHECK: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate package host configuration
        run: |
          : "${PACKAGE_HOST:?Set repository variable PACKAGE_HOST}"
          : "${PACKAGE_BASE_URL:?Set repository variable PACKAGE_BASE_URL}"
          : "${PACKAGE_BUCKET:?Set repository variable PACKAGE_BUCKET}"
          : "${PACKAGE_S3_ENDPOINT:?Set repository variable PACKAGE_S3_ENDPOINT}"

      - name: Validate release ref
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "push" ]; then
            exit 0
          fi

          tag_pattern='^target\.[A-Za-z0-9._-]+-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if [[ ! "${GITHUB_REF_NAME}" =~ ${tag_pattern} ]]; then
            echo "invalid release tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "release tags must point at commits contained in origin/main" >&2
            exit 1
          fi

      - name: Setup Pkl
        uses: ./.github/actions/setup-pkl
        with:
          version: ${{ env.PKL_VERSION }}
          linux-amd64-sha256: ${{ env.PKL_LINUX_AMD64_SHA256 }}

      - name: Resolve release projects
        id: release-projects
        shell: bash
        env:
          RELEASE_CONFIRM_INPUT: ${{ github.event.inputs.confirm || '' }}
          RELEASE_PROJECTS_INPUT: ${{ github.event.inputs.projects || '' }}
        run: |
          set -euo pipefail

          release_input="${RELEASE_PROJECTS_INPUT}"
          release_confirm="${RELEASE_CONFIRM_INPUT}"
          ref_name="${GITHUB_REF_NAME:-}"
          projects=()

          validate_package_name() {
            if [[ ! "$1" =~ ^target\.[A-Za-z0-9._-]+$ ]]; then
              echo "invalid package name: $1" >&2
              echo "expected target.<name> or packages/target.<name>" >&2
              exit 1
            fi
          }

          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            if [ "${release_confirm}" != "publish" ]; then
              echo "manual releases require confirm=publish" >&2
              exit 1
            fi

            if [ -z "${release_input}" ]; then
              echo "manual releases must specify one or more projects" >&2
              exit 1
            fi
          fi

          if [ -n "${release_input}" ]; then
            normalized_input="${release_input//,/ }"

            for token in ${normalized_input}; do
              if [[ "${token}" == packages/* ]]; then
                project="${token%/}"
                package_name="${project#packages/}"
              else
                package_name="${token%/}"
                project="packages/${package_name}"
              fi

              validate_package_name "${package_name}"

              if [ ! -d "${project}" ]; then
                echo "unknown package project: ${project}" >&2
                exit 1
              fi

              projects+=("${project}")
            done
          elif [[ "${ref_name}" == target.*-v* ]]; then
            package_name="${ref_name%%-v*}"
            validate_package_name "${package_name}"
            project="packages/${package_name}"

            if [ ! -d "${project}" ]; then
              echo "unknown tagged package project: ${project}" >&2
              exit 1
            fi

            projects=("${project}")
          else
            echo "release projects could not be resolved from manual input or tag ref" >&2
            exit 1
          fi

          printf 'projects<<EOF\n' >> "${GITHUB_OUTPUT}"
          printf '%s\n' "${projects[@]}" >> "${GITHUB_OUTPUT}"
          printf 'EOF\n' >> "${GITHUB_OUTPUT}"

      - name: Validate tagged package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          release_projects='${{ steps.release-projects.outputs.projects }}'
          mapfile -t projects < <(printf '%s\n' "${release_projects}")

          if [ "${#projects[@]}" -ne 1 ]; then
            echo "tag-triggered releases must resolve to exactly one project" >&2
            exit 1
          fi

          project="${projects[0]}"
          tag_version="${GITHUB_REF_NAME##*-v}"
          project_version="$(
            pkl eval \
              --project-dir "${project}" \
              "${project}/PklProject" \
              -x package.version
          )"

          if [ "${project_version}" != "${tag_version}" ]; then
            echo "tag version ${tag_version} does not match ${project} version ${project_version}" >&2
            exit 1
          fi

      - name: Generate workspace manifests
        run: pkl eval -m . root-files.pkl

      - name: Resolve package dependencies for release host
        run: pkl project resolve . packages/target.*

      - name: Build package artifacts
        shell: bash
        run: |
          set -euo pipefail

          release_projects='${{ steps.release-projects.outputs.projects }}'
          mapfile -t projects < <(printf '%s\n' "${release_projects}")

          ./scripts/package-artifacts.sh "${projects[@]}"

      - name: Build publish layout
        run: ./scripts/build-publish-layout.sh

      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-artifacts
          path: dist/package-artifacts
          if-no-files-found: ignore

      - name: Upload publish layout
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-publish-layout
          path: dist/publish
          if-no-files-found: ignore

      - name: Validate publishing credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PACKAGE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PACKAGE_AWS_SECRET_ACCESS_KEY }}
        run: |
          : "${AWS_ACCESS_KEY_ID:?Set repository secret PACKAGE_AWS_ACCESS_KEY_ID}"
          : "${AWS_SECRET_ACCESS_KEY:?Set repository secret PACKAGE_AWS_SECRET_ACCESS_KEY}"

      - name: Verify AWS CLI
        run: aws --version

      - name: Publish package host
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PACKAGE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PACKAGE_AWS_SECRET_ACCESS_KEY }}
        run: ./scripts/sync-publish-layout.sh

  attach-release-assets:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-artifacts
          path: dist/package-artifacts

      - name: Attach release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/package-artifacts/**/*
