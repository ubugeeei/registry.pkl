name: Release a target.* package
description: Track cutting a new SemVer release for one of the first-party packages.
title: "release(<package>): <version>"
labels:
  - release
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - target.core
        - target.js
        - target.env
        - target.rust
        - target.editor
        - target.agent
        - target.ci
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Target version
      description: SemVer (e.g. 0.2.0). Must match the version declared in the package's PklProject.
      placeholder: 0.2.0
    validations:
      required: true
  - type: textarea
    id: changes
    attributes:
      label: Notable changes since last release
      placeholder: |
        - feat: ...
        - fix: ...
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-release checklist
      options:
        - label: PklProject `package.version` matches the requested version
        - label: `pkl test packages/<package>` passes locally
        - label: `scripts/release.sh --dry-run <package> <version>` succeeds
        - label: No existing `<package>@<version>` tag in the repo
        - label: Versioning policy followed (target.core breaking change ⇒ downstream minor bump)
